<!DOCTYPE html><html><head><meta charset="utf-8"><style>html,body{margin:0}iframe{width:1440px;height:900px;border:0;display:block}</style></head>
<body><iframe id="f" src="http://localhost:8080/index.html"></iframe>
<script>
 const extra=parseInt(location.hash.slice(1)||'0',10);
 const f=document.getElementById('f');
 f.addEventListener('load',()=>setTimeout(()=>{try{
   const w=f.contentWindow,d=f.contentDocument;
   if(w.ScrollTrigger) w.ScrollTrigger.refresh();
   const el=d.getElementById('loja');
   const absY=el.getBoundingClientRect().top + w.scrollY;
   if(w.__lenis){w.__lenis.scrollTo(absY+extra,{immediate:true});}
   if(w.ScrollTrigger) w.ScrollTrigger.update();
 }catch(e){document.title='ERR '+e.message}},4500));
</script></body></html>
